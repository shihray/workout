<!DOCTYPE html>
<html lang="zh-TW" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>我的健身訓練紀錄器</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#fff7ed',
                            100: '#ffedd5',
                            500: '#f97316', /* 亮麗重訓橘 */
                            600: '#ea580c',
                            700: '#c2410c',
                        },
                        darkBg: '#0f172a',
                        cardBg: '#1e293b'
                    }
                }
            }
        }
    </script>
    <style>
        /* 隱藏行動端原生滾動條，維持簡潔流暢的手感 */
        ::-webkit-scrollbar {
            display: none;
        }
        body {
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        /* 按鈕反饋回彈效果 */
        .tap-active:active {
            transform: scale(0.96);
        }
    </style>
</head>
<body class="bg-darkBg text-slate-100 min-h-screen flex flex-col pb-24 select-none">

    <!-- 頂部導航欄 -->
    <header class="sticky top-0 bg-darkBg/95 backdrop-blur-md border-b border-slate-800 z-30 px-4 py-3 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black text-brand-500 tracking-wider">GYM DAILY</h1>
            <p id="current-date" class="text-xs text-slate-400">正在獲取日期...</p>
        </div>
        <div class="flex items-center space-x-2">
            <!-- 編輯 JSON 快捷按鈕 -->
            <button onclick="openJsonEditorModal()" class="bg-slate-800 hover:bg-slate-700 text-slate-200 border border-slate-700 rounded-lg px-2.5 py-1.5 text-xs font-bold flex items-center space-x-1 transition tap-active shadow">
                <span>⚙️ 編輯課表 JSON</span>
            </button>
        </div>
    </header>

    <!-- 主容器 (限制最大寬度，完美適配手機與桌面瀏覽器) -->
    <main class="w-full max-w-md mx-auto px-4 py-4 flex-grow space-y-6">

        <!-- 訓練日選擇分頁頁籤 -->
        <div class="bg-slate-800/80 p-1 rounded-xl flex space-x-1">
            <button onclick="switchTab('chest')" id="tab-chest" class="tab-btn flex-1 py-2.5 text-sm font-bold rounded-lg transition-all duration-200 tap-active bg-brand-500 text-white shadow-lg">
                胸肩三頭
            </button>
            <button onclick="switchTab('back')" id="tab-back" class="tab-btn flex-1 py-2.5 text-sm font-bold rounded-lg transition-all duration-200 tap-active text-slate-400 hover:text-slate-200">
                背肩二頭
            </button>
            <button onclick="switchTab('legs')" id="tab-legs" class="tab-btn flex-1 py-2.5 text-sm font-bold rounded-lg transition-all duration-200 tap-active text-slate-400 hover:text-slate-200">
                腿日課表
            </button>
        </div>

        <!-- 當天運動數據看板 -->
        <div class="bg-gradient-to-br from-slate-800 to-slate-900 border border-slate-700/60 rounded-2xl p-4 shadow-xl relative overflow-hidden">
            <div class="absolute -right-10 -bottom-10 opacity-5 text-white pointer-events-none">
                <svg class="w-40 h-40" fill="currentColor" viewBox="0 0 24 24"><path d="M20.57 14.86L22 13.43l-1.43-1.43L19 13.57l-1.43-1.43-1.43 1.43L17.57 15l-1.43 1.43 1.43 1.43L19 16.43l1.43 1.43 1.43-1.43-1.43-1.43 1.43-1.43zM3.43 9.14L2 10.57l1.43 1.43L5 10.43l1.43 1.43L5 10.43l1.43-1.43L6.43 9l1.43-1.43-1.43-1.43L5 7.57 3.57 6.14l-1.43 1.43 1.43 1.43-1.43 1.43zM12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 13v1c0 1.1.9 2 2 2v1.93zm6.79-5.14c-.18.37-.4.71-.66 1.03L18 14.5V13c0-1.1-.9-2-2-2h-3v-3c0-.55-.45-1-1-1H9V5.07c1 .3 2 .93 2.79 1.72l4.15 4.15c.53.53.85 1.25.85 2.05v1.82c0 .35.14.69.39.94l1.66 1.66z"/></svg>
            </div>

            <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3">今日訓練成效統計</h3>
            
            <div class="grid grid-cols-3 gap-2 text-center">
                <div class="bg-slate-900/40 py-3 px-2 rounded-xl border border-slate-700/30">
                    <span class="block text-2xl font-black text-brand-500" id="stat-completed-count">0</span>
                    <span class="text-[10px] text-slate-400">已完成動作</span>
                </div>
                <div class="bg-slate-900/40 py-3 px-2 rounded-xl border border-slate-700/30">
                    <span class="block text-2xl font-black text-emerald-400" id="stat-total-volume">0</span>
                    <span class="text-[10px] text-slate-400">總訓練量 (lb)</span>
                </div>
                <div class="bg-slate-900/40 py-3 px-2 rounded-xl border border-slate-700/30">
                    <span class="block text-2xl font-black text-cyan-400" id="stat-completion-rate">0%</span>
                    <span class="text-[10px] text-slate-400">完課率</span>
                </div>
            </div>

            <!-- 進度條 -->
            <div class="mt-4">
                <div class="flex justify-between text-[11px] text-slate-400 mb-1">
                    <span>本日課表進度</span>
                    <span id="progress-text">0 / 0</span>
                </div>
                <div class="w-full bg-slate-950 h-2 rounded-full overflow-hidden">
                    <div id="progress-bar" class="bg-gradient-to-r from-brand-500 to-emerald-500 h-full w-0 transition-all duration-300"></div>
                </div>
            </div>
        </div>

        <!-- 動作列表 -->
        <div class="space-y-4" id="exercise-list">
            <!-- 動作卡片會由此處動態載入 -->
        </div>

        <!-- 追加動作與重設按鈕 -->
        <div class="flex space-x-3">
            <button onclick="openCustomModal()" class="flex-1 bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-200 font-bold py-3 px-4 rounded-xl flex items-center justify-center space-x-2 tap-active shadow-md">
                <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 4v16m8-8H4"/></svg>
                <span>追加自訂動作</span>
            </button>
            <button onclick="openConfirmModal('reset')" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 text-rose-400 font-bold py-3 px-4 rounded-xl flex items-center justify-center tap-active shadow-md" title="重設今天進度">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 1121.21 8H17"/></svg>
            </button>
        </div>
    </main>

    <!-- 底部固定浮動操作列 -->
    <div class="fixed bottom-0 left-0 right-0 bg-slate-900/90 backdrop-blur-lg border-t border-slate-800 py-3 px-4 z-40">
        <div class="max-w-md mx-auto flex space-x-3">
            <button onclick="exportToCSV()" class="w-full bg-gradient-to-r from-brand-500 to-brand-600 hover:from-brand-600 hover:to-brand-700 text-white font-black py-3 px-6 rounded-xl flex items-center justify-center space-x-2 shadow-lg shadow-brand-500/20 tap-active">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/></svg>
                <span>完成訓練・匯出 CSV 檔</span>
            </button>
        </div>
    </div>

    <!-- 休息計時器懸浮視窗 (預設隱藏) -->
    <div id="timer-toast" class="fixed bottom-24 right-4 left-4 max-w-sm mx-auto bg-slate-900 border-2 border-brand-500 rounded-2xl p-4 shadow-2xl z-50 flex items-center justify-between transform translate-y-32 opacity-0 pointer-events-none transition-all duration-300">
        <div class="flex items-center space-x-3">
            <div class="relative flex items-center justify-center w-12 h-12">
                <!-- 倒數圓環背景 -->
                <svg class="absolute w-12 h-12 transform -rotate-90">
                    <circle cx="24" cy="24" r="20" stroke="#334155" stroke-width="3" fill="transparent"/>
                    <circle id="timer-progress" cx="24" cy="24" r="20" stroke="#f97316" stroke-width="3" fill="transparent" stroke-dasharray="125.6" stroke-dashoffset="0"/>
                </svg>
                <span id="timer-countdown" class="text-base font-black text-brand-500">45</span>
            </div>
            <div>
                <h4 class="text-sm font-bold text-slate-100">肌肉休息中...</h4>
                <p id="timer-exercise-name" class="text-xs text-slate-400">啞鈴-臥推</p>
            </div>
        </div>
        <div class="flex space-x-2">
            <button onclick="adjustTimer(-10)" class="bg-slate-800 text-xs font-bold text-slate-300 px-2 py-1.5 rounded-lg tap-active">-10s</button>
            <button onclick="adjustTimer(10)" class="bg-slate-800 text-xs font-bold text-slate-300 px-2 py-1.5 rounded-lg tap-active">+10s</button>
            <button onclick="stopTimer()" class="bg-rose-500/20 text-rose-400 border border-rose-500/30 text-xs font-bold px-3 py-1.5 rounded-lg tap-active">跳過</button>
        </div>
    </div>

    <!-- 課表 JSON 編輯器 Modal 視窗 -->
    <div id="json-modal" class="fixed inset-0 bg-black/75 backdrop-blur-md z-50 flex items-center justify-center opacity-0 pointer-events-none transition-all duration-200 p-4">
        <div class="bg-slate-900 border border-slate-700/80 rounded-2xl w-full max-w-lg p-5 flex flex-col h-[85vh] shadow-2xl space-y-4">
            <div class="flex justify-between items-center border-b border-slate-800 pb-3">
                <div>
                    <h3 class="text-lg font-black text-brand-500">✏️ 課表 JSON 編輯器</h3>
                    <p class="text-xs text-slate-400">在此直接修改預設組數 (sets)、次數 (reps) 或重量 (weightLb)</p>
                </div>
                <button onclick="closeJsonEditorModal()" class="text-slate-400 hover:text-white p-1">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <!-- JSON 文字輸入框 -->
            <div class="flex-grow">
                <textarea id="json-textarea" class="w-full h-full bg-slate-950 text-slate-300 font-mono text-xs p-3 rounded-xl border border-slate-800 focus:outline-none focus:border-brand-500 resize-none overflow-y-auto leading-relaxed focus:ring-1 focus:ring-brand-500"></textarea>
            </div>
            <!-- 按鈕區 -->
            <div class="flex justify-between items-center pt-2">
                <button onclick="restoreDefaultJson()" class="bg-rose-500/10 hover:bg-rose-500/20 border border-rose-500/30 text-rose-400 font-bold py-2.5 px-4 rounded-xl tap-active text-xs">
                    恢復原廠預設值
                </button>
                <div class="flex space-x-3">
                    <button onclick="closeJsonEditorModal()" class="bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold py-2.5 px-4 rounded-xl tap-active text-xs">
                        取消
                    </button>
                    <button onclick="saveJsonEditorData()" class="bg-brand-500 hover:bg-brand-600 text-white font-black py-2.5 px-5 rounded-xl tap-active text-xs shadow-lg shadow-brand-500/20">
                        儲存並立即套用
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- 自訂動作 Modal 視窗 -->
    <div id="custom-modal" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-200 p-4">
        <div class="bg-slate-900 border border-slate-700/80 rounded-2xl w-full max-w-sm p-5 space-y-4 shadow-2xl">
            <div class="flex justify-between items-center border-b border-slate-800 pb-3">
                <h3 class="text-lg font-black text-brand-500">追加自訂動作</h3>
                <button onclick="closeCustomModal()" class="text-slate-400 hover:text-white p-1">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
            <div class="space-y-3">
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1">動作中文名稱</label>
                    <input type="text" id="custom-name" placeholder="例如：啞鈴斜板彎舉" class="w-full bg-slate-800 border border-slate-700 rounded-lg py-2 px-3 text-slate-100 focus:outline-none focus:border-brand-500 text-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold text-slate-400 mb-1">英文名稱（選填）</label>
                    <input type="text" id="custom-eng" placeholder="Incline Dumbbell Curl" class="w-full bg-slate-800 border border-slate-700 rounded-lg py-2 px-3 text-slate-100 focus:outline-none focus:border-brand-500 text-sm">
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-1">預計組數 (Sets)</label>
                        <input type="number" id="custom-sets" value="4" class="w-full bg-slate-800 border border-slate-700 rounded-lg py-2 px-3 text-slate-100 focus:outline-none focus:border-brand-500 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-1">每組次數 (Reps)</label>
                        <input type="number" id="custom-reps" value="8" class="w-full bg-slate-800 border border-slate-700 rounded-lg py-2 px-3 text-slate-100 focus:outline-none focus:border-brand-500 text-sm">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-1">重量 (LB)</label>
                        <input type="number" id="custom-weight-kg" value="22" class="w-full bg-slate-800 border border-slate-700 rounded-lg py-2 px-3 text-slate-100 focus:outline-none focus:border-brand-500 text-sm">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-slate-400 mb-1">休息時間 (秒)</label>
                        <input type="number" id="custom-rest" value="45" class="w-full bg-slate-800 border border-slate-700 rounded-lg py-2 px-3 text-slate-100 focus:outline-none focus:border-brand-500 text-sm">
                    </div>
                </div>
            </div>
            <div class="flex space-x-3 pt-2">
                <button onclick="closeCustomModal()" class="flex-1 bg-slate-800 hover:bg-slate-700 text-slate-300 font-bold py-2.5 rounded-xl tap-active text-sm">取消</button>
                <button onclick="addCustomExercise()" class="flex-1 bg-brand-500 hover:bg-brand-600 text-white font-bold py-2.5 rounded-xl tap-active text-sm">新增至今日課表</button>
            </div>
        </div>
    </div>

    <!-- 客製化對話框 (安全、不被瀏覽器阻擋的 Confirm/Alert 完美替代方案) -->
    <div id="custom-dialog" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center opacity-0 pointer-events-none transition-opacity duration-200 p-4">
        <div class="bg-slate-900 border border-slate-700/80 rounded-2xl w-full max-w-sm p-5 space-y-4 shadow-2xl text-center">
            <div class="w-16 h-16 bg-slate-850 border border-slate-800 rounded-full flex items-center justify-center mx-auto text-3xl shadow-inner" id="dialog-icon">
                💡
            </div>
            <div class="space-y-1">
                <h3 class="text-lg font-black text-slate-100" id="dialog-title">通知</h3>
                <p class="text-sm text-slate-400 leading-relaxed" id="dialog-message">訊息內容</p>
            </div>
            <div class="flex space-x-3 pt-2" id="dialog-actions">
                <!-- 按鈕會由此處動態填充 -->
            </div>
        </div>
    </div>

    <!-- 提示通知元件 -->
    <div id="toast-message" class="fixed top-5 left-1/2 transform -translate-x-1/2 bg-slate-900/95 border border-emerald-500 text-slate-100 text-sm py-2.5 px-4 rounded-xl shadow-2xl z-50 flex items-center space-x-2 transition-all duration-300 opacity-0 pointer-events-none">
        <svg class="w-5 h-5 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
        <span id="toast-text">設定成功！</span>
    </div>

    <script>
        // -------------------------------------------------------------
        // 課表資料來源：獨立的 JSON 檔案（workout-data.json）
        // 透過 fetch 載入，方便使用者直接編輯該檔案來修改、擴展課表
        // -------------------------------------------------------------
        const WORKOUT_DATA_URL = 'workout-data.json';

        // 預設課表 JSON（啟動時由 workout-data.json 載入後填入此變數）
        let DEFAULT_WORKOUT_JSON = '{"chest":[],"back":[],"legs":[]}';

        // 從外部 JSON 檔載入預設課表
        async function loadDefaultWorkoutJson() {
            const res = await fetch(WORKOUT_DATA_URL, { cache: 'no-store' });
            if (!res.ok) {
                throw new Error(`HTTP ${res.status} ${res.statusText}`);
            }
            const text = await res.text();
            // 驗證為合法 JSON 後才採用
            JSON.parse(text);
            DEFAULT_WORKOUT_JSON = text;
        }

        let initialWorkoutData = {};
        let workoutState = {};
        let currentTab = 'chest';

        // 智慧型動作 SVG 圖示生成器 (依據 ID 或名稱進行完美運動幾何骨架渲染)
        function getExerciseIcon(id, name = '', eng = '') {
            const lowerName = name.toLowerCase();
            const lowerEng = eng.toLowerCase();
            const cleanId = id.split('_')[0]; // 移除自訂動作的時間戳

            // 1. 啞鈴平板臥推 / 上胸臥推
            if (cleanId === 'c1' || cleanId === 'c2' || lowerName.includes('臥推') || lowerEng.includes('bench press') || lowerEng.includes('chest press')) {
                const inclineAngle = (cleanId === 'c2' || lowerName.includes('上胸')) ? 'transform="rotate(-20 12 12)"' : '';
                return `
                    <svg class="w-12 h-12" viewBox="0 0 32 32" fill="none">
                        <line x1="6" y1="20" x2="26" y2="20" stroke="#475569" stroke-width="1.5" ${inclineAngle}/>
                        <line x1="10" y1="20" x2="10" y2="26" stroke="#475569" stroke-width="1.5"/>
                        <line x1="22" y1="20" x2="22" y2="26" stroke="#475569" stroke-width="1.5"/>
                        <rect x="8" y="16" width="16" height="4" rx="1" fill="#334155" ${inclineAngle}/>
                        <circle cx="25" cy="18" r="1.5" fill="#94a3b8" ${inclineAngle}/>
                        <ellipse cx="18" cy="17" rx="2.5" ry="1.2" fill="#f97316" ${inclineAngle}/>
                        <path d="M14 17v-4h-2M14 13h4M18 13v4" stroke="#e2e8f0" stroke-width="1.2" stroke-linecap="round"/>
                        <circle cx="12" cy="13" r="1.5" fill="#f97316"/>
                        <circle cx="20" cy="13" r="1.5" fill="#f97316"/>
                        <path d="M16 11V6" stroke="#06b6d4" stroke-width="1" stroke-linecap="round"/>
                        <path d="M14 8l2-2 2 2" stroke="#06b6d4" stroke-width="1" stroke-linecap="round"/>
                    </svg>
                `;
            }
            
            // 2. 啞鈴平胸飛鳥 / 上胸飛鳥
            if (cleanId === 'c3' || cleanId === 'c4' || lowerName.includes('飛鳥') || lowerEng.includes('fly')) {
                return `
                    <svg class="w-12 h-12" viewBox="0 0 32 32" fill="none">
                        <rect x="13" y="6" width="6" height="20" rx="1" fill="#1e293b" stroke="#475569" stroke-width="1.2"/>
                        <circle cx="16" cy="14" r="4.5" fill="#334155"/>
                        <path d="M12.5 14h7" stroke="#f97316" stroke-width="2"/>
                        <path d="M12 14c-1-2-4-1-4 1M20 14c1-2 4-1 4 1" stroke="#e2e8f0" stroke-width="1.2" stroke-linecap="round"/>
                        <circle cx="7" cy="15" r="1.5" fill="#f97316"/>
                        <circle cx="25" cy="15" r="1.5" fill="#f97316"/>
                        <path d="M8 11c1.5-1 3.5-1.5 5-1.5M24 11c-1.5-1-3.5-1.5-5-1.5" stroke="#06b6d4" stroke-width="1" stroke-linecap="round"/>
                    </svg>
                `;
            }

            // 3. 啞鈴-肩側舉 (單臂 / 雙臂)
            if (cleanId === 'c5' || cleanId === 'b9' || lowerName.includes('側舉') || lowerEng.includes('lateral raise')) {
                return `
                    <svg class="w-12 h-12" viewBox="0 0 32 32" fill="none">
                        <line x1="16" y1="12" x2="16" y2="24" stroke="#334155" stroke-width="2"/>
                        <circle cx="16" cy="10" r="1.5" fill="#94a3b8"/>
                        <path d="M14 12v6" stroke="#334155" stroke-width="1.2"/>
                        <path d="M16 12.5h6" stroke="#e2e8f0" stroke-width="1.8" stroke-linecap="round"/>
                        <circle cx="22" cy="12.5" r="1.5" fill="#f97316"/>
                        <circle cx="17.5" cy="12" r="1.8" fill="#f97316"/>
                        <path d="M18 19c2-0.5 3.5-2 3.5-4" stroke="#06b6d4" stroke-width="1" stroke-linecap="round"/>
                    </svg>
                `;
            }

        // -------------------------------------------------------------
        // 安全、不被瀏覽器阻擋的 Confirm/Alert 完美替代方案
        // -------------------------------------------------------------
        let dialogResolve = null;

        function openCustomDialog(title, message, isConfirm = false, icon = '💡') {
            return new Promise((resolve) => {
                dialogResolve = resolve;
                document.getElementById('dialog-title').innerText = title;
                document.getElementById('dialog-message').innerText = message;
                document.getElementById('dialog-icon').innerText = icon;

                const actionsContainer = document.getElementById('dialog-actions');
                actionsContainer.innerHTML = '';

                if (isConfirm) {
                    actionsContainer.innerHTML = `
                        <button onclick="closeCustomDialog(false)" class="flex-1 bg-slate-800 hover:bg-slate-750 text-slate-300 font-bold py-2.5 rounded-xl tap-active text-sm">取消</button>
                        <button onclick="closeCustomDialog(true)" class="flex-1 bg-brand-500 hover:bg-brand-600 text-white font-bold py-2.5 rounded-xl tap-active text-sm">確定</button>
                    `;
                } else {
                    actionsContainer.innerHTML = `
                        <button onclick="closeCustomDialog(true)" class="w-full bg-brand-500 hover:bg-brand-600 text-white font-bold py-2.5 rounded-xl tap-active text-sm">我知道了</button>
                    `;
                }

                const dialog = document.getElementById('custom-dialog');
                dialog.style.opacity = '1';
                dialog.style.pointerEvents = 'auto';
            });
        }

        function closeCustomDialog(result) {
            const dialog = document.getElementById('custom-dialog');
            dialog.style.opacity = '0';
            dialog.style.pointerEvents = 'none';
            if (dialogResolve) dialogResolve(result);
        }

        async function openConfirmModal(type) {
            if (type === 'reset') {
                const confirmed = await openCustomDialog("重設今天課表", "確定要重設今天的訓練紀錄嗎？所有動作的「實際組數」、「實際次數」及「實際重量」將回復至預設狀態，並取消已完成標記。", true, "⚠️");
                if (confirmed) {
                    resetCurrentTab();
                }
            }
        }

        // -------------------------------------------------------------
        // JSON 編輯器核心邏輯
        // -------------------------------------------------------------
        function openJsonEditorModal() {
            // 從 LocalStorage 載入，如果沒有就載入預設值
            const currentJsonText = localStorage.getItem('workout_custom_json') || DEFAULT_WORKOUT_JSON;
            document.getElementById('json-textarea').value = currentJsonText;

            const modal = document.getElementById('json-modal');
            modal.style.opacity = '1';
            modal.style.pointerEvents = 'auto';
        }

        function closeJsonEditorModal() {
            const modal = document.getElementById('json-modal');
            modal.style.opacity = '0';
            modal.style.pointerEvents = 'none';
        }

        async function saveJsonEditorData() {
            const rawText = document.getElementById('json-textarea').value;
            try {
                // 語法防錯校驗
                const parsed = JSON.parse(rawText);
                
                // 校驗主分類結構是否完好
                if (!parsed.chest || !parsed.back || !parsed.legs) {
                    throw new Error("格式不完整：JSON 中必須包含 'chest', 'back', 'legs' 三大訓練日分類哦！");
                }

                // 儲存並套用
                localStorage.setItem('workout_custom_json', rawText);
                closeJsonEditorModal();
                
                // 重新初始化狀態
                initializeWorkoutDatabase();
                renderExercises();
                updateStatsSummary();
                showToast("課表 JSON 更新成功！", "success");
            } catch (err) {
                await openCustomDialog(
                    "JSON 格式有誤", 
                    `抱歉，您輸入的 JSON 語法不正確。錯誤訊息如下，請更正後再試一次：\n\n${err.message}`, 
                    false, 
                    "❌"
                );
            }
        }

        async function restoreDefaultJson() {
            const confirmed = await openCustomDialog(
                "恢復預設值", 
                "確定要將課表回復為最初的出廠預設值嗎？這將會清除您在 JSON 編輯器中進行的所有自訂修改與數值調整。", 
                true, 
                "🔄"
            );
            if (confirmed) {
                localStorage.removeItem('workout_custom_json');
                document.getElementById('json-textarea').value = DEFAULT_WORKOUT_JSON;
                closeJsonEditorModal();
                
                initializeWorkoutDatabase();
                renderExercises();
                updateStatsSummary();
                showToast("已回復原廠設定！", "success");
            }
        }

        // -------------------------------------------------------------
        // 課表資料庫初始化
        // -------------------------------------------------------------
        function initializeWorkoutDatabase() {
            const storedJson = localStorage.getItem('workout_custom_json') || DEFAULT_WORKOUT_JSON;
            try {
                initialWorkoutData = JSON.parse(storedJson);
            } catch (e) {
                // 若有意外發生則直接覆寫預設值
                initialWorkoutData = JSON.parse(DEFAULT_WORKOUT_JSON);
                localStorage.setItem('workout_custom_json', DEFAULT_WORKOUT_JSON);
            }

            // 深拷貝並建立實際做完之欄位，預設實際次數為 8 次
            Object.keys(initialWorkoutData).forEach(day => {
                workoutState[day] = initialWorkoutData[day].map(ex => {
                    return {
                        ...ex,
                        actualSets: ex.sets,
                        actualReps: 8, // 預設實際次數 8 次
                        actualWeightLb: ex.weightLb,
                        completed: false
                    };
                });
            });
        }

        // -------------------------------------------------------------
        // 主程序引導
        // -------------------------------------------------------------
        window.onload = async function() {
            // 先從外部 JSON 檔載入預設課表
            try {
                await loadDefaultWorkoutJson();
            } catch (err) {
                await openCustomDialog(
                    "課表資料載入失敗",
                    `無法讀取 workout-data.json，請確認該檔案與本網頁位於同一資料夾，且透過本機伺服器（http://）開啟而非直接以 file:// 開啟。\n\n錯誤訊息：${err.message}`,
                    false,
                    "❌"
                );
            }

            // 初始化資料庫
            initializeWorkoutDatabase();

            // 設定今日日期
            const dateObj = new Date();
            const daysOfWeek = ["星期日", "星期一", "星期二", "星期三", "星期四", "星期五", "星期六"];
            document.getElementById('current-date').innerText = `${dateObj.getFullYear()}/${String(dateObj.getMonth() + 1).padStart(2, '0')}/${String(dateObj.getDate()).padStart(2, '0')} ${daysOfWeek[dateObj.getDay()]}`;

            // 渲染當前 Tab
            renderExercises();
            updateStatsSummary();
        };

        // 頁籤切換
        function switchTab(tabId) {
            currentTab = tabId;
            
            // UI 狀態切換
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('bg-brand-500', 'text-white', 'shadow-lg');
                btn.classList.add('text-slate-400', 'hover:text-slate-200');
            });

            const activeBtn = document.getElementById(`tab-${tabId}`);
            activeBtn.classList.remove('text-slate-400', 'hover:text-slate-200');
            activeBtn.classList.add('bg-brand-500', 'text-white', 'shadow-lg');

            renderExercises();
            updateStatsSummary();
        }

        function renderExercises() {
            const listContainer = document.getElementById('exercise-list');
            listContainer.innerHTML = '';

            const exercises = workoutState[currentTab] || [];
            
            if (exercises.length === 0) {
                listContainer.innerHTML = `
                    <div class="text-center py-10 bg-slate-800/20 rounded-2xl border border-dashed border-slate-700">
                        <p class="text-slate-400 text-sm">目前無動作，可以下方追加自訂動作</p>
                    </div>
                `;
                return;
            }

            exercises.forEach((ex) => {
                const isCompleted = ex.completed;
                const cardBg = isCompleted ? 'border-emerald-500/30 bg-emerald-950/20 shadow-md' : 'border-slate-800 bg-slate-900/60 shadow-sm';
                const checkCircleBg = isCompleted ? 'bg-emerald-500 border-emerald-500' : 'border-slate-600 hover:border-slate-400';
                const textMutedColor = isCompleted ? 'text-emerald-400/80' : 'text-slate-400';

                const card = document.createElement('div');
                card.className = `p-4 rounded-2xl border transition-all duration-300 ${cardBg} relative`;
                card.innerHTML = `
                    <div class="flex items-start justify-between mb-3.5">
                        <div class="flex items-start space-x-3.5">
                            <!-- 圓形完成核取鈕 -->
                            <button onclick="toggleComplete('${ex.id}')" class="mt-4 w-6 h-6 rounded-full border-2 flex items-center justify-center transition-all ${checkCircleBg} tap-active focus:outline-none flex-shrink-0">
                                ${isCompleted ? `
                                    <svg class="w-4 h-4 text-slate-950" fill="none" stroke="currentColor" stroke-width="3.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
                                ` : ''}
                            </button>
                            
                            <!-- 動作圖像展示區 -->
                            <div class="w-14 h-14 rounded-xl bg-slate-950/70 border border-slate-800/80 flex items-center justify-center flex-shrink-0 shadow-inner">
                                ${getExerciseIcon(ex.id, ex.name, ex.eng)}
                            </div>

                            <div>
                                <h3 class="font-black text-sm text-slate-100 flex items-center leading-snug">
                                    ${ex.name}
                                </h3>
                                <p class="text-[11px] ${textMutedColor} leading-normal mt-0.5">${ex.eng}</p>
                                <span class="inline-block mt-1 text-[10px] bg-slate-800/85 px-2 py-0.5 rounded text-slate-400 font-medium">
                                    目標: ${ex.sets}組 × ${ex.reps}${ex.unit === 'sec' ? '秒' : '下'} (${ex.weightLb}lb)
                                </span>
                            </div>
                        </div>
                    </div>

                    <!-- 設定實際輸入欄位 -->
                    <div class="grid grid-cols-3 gap-2.5 border-t border-slate-800/50 pt-3">
                        <!-- 實際組數 -->
                        <div>
                            <span class="block text-[10px] text-slate-500 font-bold mb-1">實際組數</span>
                            <div class="flex items-center bg-slate-950/60 rounded-lg p-1 border border-slate-800">
                                <button onclick="adjustValue('${ex.id}', 'actualSets', -1)" class="w-6 h-6 text-sm text-slate-400 hover:text-white rounded flex items-center justify-center hover:bg-slate-800">-</button>
                                <span class="flex-1 text-center font-bold text-sm text-slate-100">${ex.actualSets}</span>
                                <button onclick="adjustValue('${ex.id}', 'actualSets', 1)" class="w-6 h-6 text-sm text-slate-400 hover:text-white rounded flex items-center justify-center hover:bg-slate-800">+</button>
                            </div>
                        </div>

                        <!-- 實際次數/時間 -->
                        <div>
                            <span class="block text-[10px] text-slate-500 font-bold mb-1">實際${ex.unit === 'sec' ? '秒數' : '次數'}</span>
                            <div class="flex items-center bg-slate-950/60 rounded-lg p-1 border border-slate-800">
                                <button onclick="adjustValue('${ex.id}', 'actualReps', -1)" class="w-6 h-6 text-sm text-slate-400 hover:text-white rounded flex items-center justify-center hover:bg-slate-800">-</button>
                                <span class="flex-1 text-center font-bold text-sm text-slate-100">${ex.actualReps}</span>
                                <button onclick="adjustValue('${ex.id}', 'actualReps', 1)" class="w-6 h-6 text-sm text-slate-400 hover:text-white rounded flex items-center justify-center hover:bg-slate-800">+</button>
                            </div>
                        </div>

                        <!-- 實際重量 (磅 LB) -->
                        <div>
                            <span class="block text-[10px] text-slate-500 font-bold mb-1">實際重量 (lb)</span>
                            <div class="flex items-center bg-slate-950/60 rounded-lg p-1 border border-slate-800">
                                <button onclick="adjustValue('${ex.id}', 'actualWeightLb', -5)" class="w-5 h-6 text-xs text-slate-500 hover:text-white rounded flex items-center justify-center">-5</button>
                                <input type="number" value="${ex.actualWeightLb}" onchange="updateWeightInput('${ex.id}', this.value)" class="w-full text-center bg-transparent font-black text-sm text-brand-500 focus:outline-none [appearance:textfield] [&::-webkit-outer-spin-button]:appearance-none [&::-webkit-inner-spin-button]:appearance-none">
                                <button onclick="adjustValue('${ex.id}', 'actualWeightLb', 5)" class="w-5 h-6 text-xs text-slate-500 hover:text-white rounded flex items-center justify-center">+5</button>
                            </div>
                        </div>
                    </div>

                    <!-- 卡片下方操作：休息倒數與刪除自訂動作 -->
                    <div class="flex justify-between items-center mt-3 pt-2 border-t border-slate-800/30">
                        <button onclick="startRestTimer('${ex.name}', ${ex.rest})" class="inline-flex items-center space-x-1 text-xs text-slate-400 hover:text-brand-500 tap-active">
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                            <span>本組結束：建議休息 ${ex.rest} 秒</span>
                        </button>
                        
                        ${ex.id.startsWith('custom_') ? `
                            <button onclick="deleteExercise('${ex.id}')" class="text-xs text-rose-500 hover:text-rose-400 tap-active">
                                移除此動作
                            </button>
                        ` : ''}
                    </div>
                `;
                listContainer.appendChild(card);
            });
        }

        function updateWeightInput(id, val) {
            const exObj = workoutState[currentTab].find(e => e.id === id);
            if (exObj) {
                const num = parseInt(val) || 0;
                exObj.actualWeightLb = Math.max(0, num);
                updateStatsSummary();
            }
        }

        function toggleComplete(id) {
            const exObj = workoutState[currentTab].find(e => e.id === id);
            if (exObj) {
                exObj.completed = !exObj.completed;
                renderExercises();
                updateStatsSummary();
                
                if (exObj.completed) {
                    showToast(`「${exObj.name}」已完成！`, 'success');
                }
            }
        }

        function adjustValue(id, field, amount) {
            const exObj = workoutState[currentTab].find(e => e.id === id);
            if (exObj) {
                exObj[field] = Math.max(0, exObj[field] + amount);
                renderExercises();
                updateStatsSummary();
            }
        }

        function updateStatsSummary() {
            const list = workoutState[currentTab] || [];
            const totalCount = list.length;
            const completedList = list.filter(e => e.completed);
            const completedCount = completedList.length;

            let totalVolume = 0;
            completedList.forEach(e => {
                totalVolume += (e.actualSets * e.actualReps * e.actualWeightLb);
            });

            const completionRate = totalCount > 0 ? Math.round((completedCount / totalCount) * 100) : 0;

            document.getElementById('stat-completed-count').innerText = completedCount;
            document.getElementById('stat-total-volume').innerText = totalVolume.toLocaleString();
            document.getElementById('stat-completion-rate').innerText = `${completionRate}%`;
            document.getElementById('progress-text').innerText = `${completedCount} / ${totalCount}`;
            document.getElementById('progress-bar').style.width = `${completionRate}%`;
        }

        function showToast(text, type = 'success') {
            const toast = document.getElementById('toast-message');
            const toastText = document.getElementById('toast-text');
            
            toastText.innerText = text;
            toast.style.opacity = '1';
            toast.style.transform = 'translate(-50%, 0)';
            toast.style.pointerEvents = 'auto';

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translate(-50%, -20px)';
                toast.style.pointerEvents = 'none';
            }, 2500);
        }

        let timerInterval = null;
        let timeLeft = 0;
        let originalTime = 0;

        function playBeep() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc1 = audioCtx.createOscillator();
                const gain1 = audioCtx.createGain();
                osc1.type = 'sine';
                osc1.frequency.setValueAtTime(880, audioCtx.currentTime);
                gain1.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain1.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                osc1.connect(gain1);
                gain1.connect(audioCtx.destination);
                osc1.start();
                osc1.stop(audioCtx.currentTime + 0.3);

                setTimeout(() => {
                    const osc2 = audioCtx.createOscillator();
                    const gain2 = audioCtx.createGain();
                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(1200, audioCtx.currentTime);
                    gain2.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gain2.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                    osc2.connect(gain2);
                    gain2.connect(audioCtx.destination);
                    osc2.start();
                    osc2.stop(audioCtx.currentTime + 0.4);
                }, 150);

                if (navigator.vibrate) {
                    navigator.vibrate([200, 100, 200]);
                }
            } catch (err) {
                console.log('AudioContext not allowed or supported.', err);
            }
        }

        function startRestTimer(name, seconds) {
            if (timerInterval) clearInterval(timerInterval);

            timeLeft = seconds;
            originalTime = seconds;

            document.getElementById('timer-exercise-name').innerText = name;
            document.getElementById('timer-countdown').innerText = timeLeft;
            
            const toast = document.getElementById('timer-toast');
            toast.style.opacity = '1';
            toast.style.transform = 'translateY(0)';
            toast.style.pointerEvents = 'auto';

            updateTimerUI();

            timerInterval = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    playBeep();
                    showToast("休息時間結束！繼續加油！", "success");
                    stopTimer();
                } else {
                    updateTimerUI();
                }
            }, 1000);
        }

        function updateTimerUI() {
            document.getElementById('timer-countdown').innerText = timeLeft;
            
            const circle = document.getElementById('timer-progress');
            const totalDash = 125.6; 
            const percent = timeLeft / originalTime;
            const offset = totalDash * (1 - percent);
            circle.style.strokeDashoffset = offset;
        }

        function adjustTimer(amount) {
            timeLeft = Math.max(5, timeLeft + amount);
            if (timeLeft > originalTime) {
                originalTime = timeLeft;
            }
            updateTimerUI();
        }

        function stopTimer() {
            if (timerInterval) clearInterval(timerInterval);
            
            const toast = document.getElementById('timer-toast');
            toast.style.opacity = '0';
            toast.style.transform = 'translateY(32px)';
            toast.style.pointerEvents = 'none';
        }

        function openCustomModal() {
            const modal = document.getElementById('custom-modal');
            modal.style.opacity = '1';
            modal.style.pointerEvents = 'auto';
        }

        function closeCustomModal() {
            const modal = document.getElementById('custom-modal');
            modal.style.opacity = '0';
            modal.style.pointerEvents = 'none';
            
            document.getElementById('custom-name').value = '';
            document.getElementById('custom-eng').value = '';
        }

        function addCustomExercise() {
            const name = document.getElementById('custom-name').value.trim();
            const eng = document.getElementById('custom-eng').value.trim() || 'Custom Exercise';
            const sets = parseInt(document.getElementById('custom-sets').value) || 4;
            const reps = parseInt(document.getElementById('custom-reps').value) || 8;
            const weightLb = parseFloat(document.getElementById('custom-weight-kg').value) || 0;
            const rest = parseInt(document.getElementById('custom-rest').value) || 45;

            if (!name) {
                openCustomDialog("提醒", "請輸入動作中文名稱哦！", false, "💡");
                return;
            }

            const newEx = {
                id: `custom_${Date.now()}`,
                name: name,
                eng: eng,
                sets: sets,
                reps: reps,
                weightLb: weightLb,
                rest: rest,
                unit: 'reps',
                actualSets: sets,
                actualReps: reps,
                actualWeightLb: weightLb,
                completed: false
            };

            workoutState[currentTab].push(newEx);
            
            closeCustomModal();
            renderExercises();
            updateStatsSummary();
            showToast(`已追加「${name}」！`, 'success');
        }

        function deleteExercise(id) {
            workoutState[currentTab] = workoutState[currentTab].filter(e => e.id !== id);
            renderExercises();
            updateStatsSummary();
            showToast('已移除動作', 'success');
        }

        function resetCurrentTab() {
            initializeWorkoutDatabase(); // 重新載入 JSON 數據庫
            renderExercises();
            updateStatsSummary();
            showToast("今日進度已全數重置！", "success");
        }

        async function exportToCSV() {
            const activeList = workoutState[currentTab];
            const completedOnly = activeList.filter(e => e.completed);

            if (completedOnly.length === 0) {
                await openCustomDialog(
                    "尚未有完課紀錄", 
                    "今天好像還沒勾選完成任何動作喔！請先勾選已完成的動作，系統才能為您匯出今天的精確訓練數據。", 
                    false, 
                    "📊"
                );
                return;
            }

            const tabNames = {
                chest: '胸肩三頭',
                back: '背肩二頭',
                legs: '腿日課表'
            };

            const dateStr = document.getElementById('current-date').innerText.split(' ')[0];
            let csvContent = "日期,訓練類別,動作名稱,英文名稱,預估目標規格,實際組數,實際次數(或秒數),實際單組重量(lb),總累積訓練量(lb)\r\n";

            completedOnly.forEach(e => {
                const targetSpec = `${e.sets}組x${e.reps}${e.unit === 'sec' ? '秒' : '下'}(${e.weightLb}lb)`;
                const totalVol = e.actualSets * e.actualReps * e.actualWeightLb;
                
                const row = [
                    `"${dateStr}"`,
                    `"${tabNames[currentTab]}"`,
                    `"${e.name}"`,
                    `"${e.eng}"`,
                    `"${targetSpec}"`,
                    e.actualSets,
                    e.actualReps,
                    e.actualWeightLb,
                    totalVol
                ];
                csvContent += row.join(",") + "\r\n";
            });

            const blob = new Blob(["\ufeff" + csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);

            const link = document.createElement("a");
            const fileName = `GYM_Workout_${dateStr.replace(/\//g, '')}_${currentTab}.csv`;
            
            link.setAttribute("href", url);
            link.setAttribute("download", fileName);
            link.style.visibility = 'hidden';
            
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            showToast("CSV 下載成功！請至下載資料夾查看！");
        }
    </script>
</body>
</html>
